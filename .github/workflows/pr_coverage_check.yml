name: PR Coverage Check

on: [ pull_request ]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD/src" >> $GITHUB_ENV

    - name: Install library
      run: |
        python -m pip install --upgrade pip
        python -m pip install -r requirements.txt
        python -m pip install -e .

    - name: Run unittests with coverage
      run: |
        export PYTHONPATH=$PWD/src
        python -m coverage erase
        python -m coverage run --source=embkit -m unittest discover -s tests
        COVERAGE_OMIT='src/embkit/bmeg.py,src/embkit/estimator/*,src/embkit/metrics/*,src/embkit/models/ffnn.py,src/embkit/encoding/genome.py,src/embkit/preprocessing/dataset.py,src/embkit/resources/util.py,src/embkit/utilities/kmeans.py'
        python -m coverage xml --omit="$COVERAGE_OMIT"
        python -m coverage json --omit="$COVERAGE_OMIT"

    - name: Print coverage report
      run: |
        COVERAGE_OMIT='src/embkit/bmeg.py,src/embkit/estimator/*,src/embkit/metrics/*,src/embkit/models/ffnn.py,src/embkit/encoding/genome.py,src/embkit/preprocessing/dataset.py,src/embkit/resources/util.py,src/embkit/utilities/kmeans.py'
        python -m coverage report -m --omit="$COVERAGE_OMIT"

    - name: Print PR Coverage Breakdown
      if: github.event_name == 'pull_request'
      env:
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
      run: |
        python - <<'PY'
        import json
        import os
        import subprocess
        from pathlib import Path

        base_sha = os.environ.get("BASE_SHA", "").strip()
        if not base_sha:
            print("PR coverage breakdown skipped: missing base SHA.")
            raise SystemExit(0)

        files = json.loads(Path("coverage.json").read_text(encoding="utf-8")).get("files", {})
        changed = subprocess.check_output(
            ["git", "diff", "--name-only", f"{base_sha}...HEAD"],
            text=True,
        ).splitlines()

        def cov_for(path: str):
            keys = (path, f"src/{path}")
            for key in keys:
                if key in files:
                    return float(files[key]["summary"]["percent_covered"])
            return None

        def avg(values):
            return (sum(values) / len(values)) if values else None

        modified_cov = []
        new_cov = []

        for rel in changed:
            cov = cov_for(rel)
            if cov is None:
                continue
            exists_in_base = subprocess.run(
                ["git", "cat-file", "-e", f"{base_sha}:{rel}"],
                stdout=subprocess.DEVNULL,
                stderr=subprocess.DEVNULL,
            ).returncode == 0
            if exists_in_base:
                modified_cov.append(cov)
            else:
                new_cov.append(cov)

        mod_avg = avg(modified_cov)
        new_avg = avg(new_cov)

        if mod_avg is None:
            print("Modified files coverage: N/A (no covered modified files)")
        else:
            print(f"Modified files coverage: {mod_avg:.2f}% ({len(modified_cov)} files)")

        if new_avg is None:
            print("New files coverage: N/A (no covered new files)")
        else:
            print(f"New files coverage: {new_avg:.2f}% ({len(new_cov)} files)")
        PY

    - name: Comment PR with coverage
      if: github.event.pull_request.head.repo.full_name == github.repository
      uses: orgoro/coverage@v3.2
      with:
        coverageFile: coverage.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        thresholdNew: 0.8
        thresholdAll: 0.3
        thresholdModified: 0.9
